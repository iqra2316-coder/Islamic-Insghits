.dua-nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
.dua-tab{padding:10px 22px;border-radius:50px;border:2px solid var(--border);background:white;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;color:var(--text);}
.dua-tab.active{background:var(--emerald);color:white;border-color:var(--emerald);}

.dua-panel{display:none;}
.dua-panel.active{display:block;}

.dua-header-card{background:linear-gradient(135deg,var(--emerald),var(--emerald-mid));border-radius:20px;padding:36px 40px;margin-bottom:32px;color:white;text-align:center;position:relative;overflow:hidden;}
.dua-header-card::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill='%23ffffff' fill-opacity='0.04' d='M30 0L40 10A14 14 0 0130 14 14 14 0 0120 10z'/%3E%3C/svg%3E");}
.dua-name-ar{font-family:'Scheherazade New',serif;font-size:48px;color:var(--gold-light);direction:rtl;margin-bottom:10px;}
.dua-name-en{font-family:'Playfair Display',serif;font-size:24px;color:white;font-weight:700;margin-bottom:8px;}
.dua-desc{font-size:14px;color:rgba(255,255,255,.7);max-width:600px;margin:0 auto;}

.dua-verse{padding:24px 28px;border-bottom:1px solid var(--border-light);background:white;}
.dua-verse:first-child{border-radius:16px 16px 0 0;}
.dua-verse:last-child{border-bottom:none;border-radius:0 0 16px 16px;}
.dua-verse:nth-child(even){background:var(--cream-warm);}
.dv-num{display:inline-flex;width:32px;height:32px;align-items:center;justify-content:center;background:var(--emerald);color:white;border-radius:50%;font-size:12px;font-weight:700;float:right;margin-left:14px;margin-bottom:6px;}

.dv-urdu{font-family:'Scheherazade New',serif;font-size:18px;color:var(--emerald-mid);direction:rtl;text-align:right;line-height:1.9;margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);}
.dv-english{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text);font-style:italic;line-height:1.8;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border-light);}

.dua-controls{display:flex;gap:12px;align-items:center;background:var(--cream-warm);padding:14px 20px;border-radius:12px;margin-bottom:20px;flex-wrap:wrap;}
.ctrl-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12.5px;cursor:pointer;transition:all .2s;color:var(--text);}
.ctrl-btn.active{background:var(--emerald);color:white;border-color:var(--emerald);}
.ctrl-btn:hover:not(.active){border-color:var(--emerald);}
@media(max-width:768px){.dua-header-card{padding:24px 20px;}.dua-name-ar{font-size:36px;}.dv-arabic{font-size:22px;}.dua-verse{padding:18px 20px;}}

  {
    id:'kumayl',
    nameAr:'دُعَاءُ كُمَيل',
    nameEn:'Dua Kumayl',
    desc:'Imam Ali ibn Abi Talib (AS) ne Kumayl ibn Ziyad al-Nakhai ko sikhaya. Har Jumeraat ki raat padhna mustahab hai.',
    verses:[
      {ar:'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ',ur:'اللہ کے نام سے جو بڑا مہربان نہایت رحم والا ہے',en:'In the name of Allah, the Most Gracious, the Most Merciful'},
      {ar:'اللَّهُمَّ إِنِّي أَسْأَلُكَ بِرَحْمَتِكَ الَّتِي وَسِعَتْ كُلَّ شَيْءٍ',ur:'اے اللہ! میں تجھ سے تیری اس رحمت کے وسیلے سے مانگتا ہوں جو ہر چیز کو محیط ہے',en:'O Allah, I beseech You with Your mercy which encompasses all things'},
      {ar:'وَبِقُوَّتِكَ الَّتِي قَهَرْتَ بِهَا كُلَّ شَيْءٍ، وَخَضَعَ لَهَا كُلُّ شَيْءٍ',ur:'اور تیری اس قدرت کے ذریعے جس سے تو نے ہر چیز کو مغلوب کیا، اور ہر چیز نے اس کے سامنے سر تسلیم خم کیا',en:'And by Your power by which You dominate all things, and all things bow down to it'},
      {ar:'وَبِعَظَمَتِكَ الَّتِي مَلَأَتْ كُلَّ شَيْءٍ، وَبِسُلْطَانِكَ الَّذِي عَلاَ كُلَّ شَيْءٍ',ur:'اور تیری عظمت کے ذریعے جو ہر چیز میں بھری ہوئی ہے، اور تیری حکومت کے ذریعے جو ہر چیز سے بلند ہے',en:'And by Your greatness which has filled all things, and by Your authority which towered over all things'},

      {ar:'وَبِأَسْمَائِكَ الَّتِي مَلَأَتْ أَرْكَانَ كُلِّ شَيْءٍ',ur:'اور تیرے ناموں کے ذریعے جو ہر شے کے گوشوں میں بھرے ہوئے ہیں',en:'And by Your names which have filled the pillars of all things'},
      {ar:'وَبِعِلْمِكَ الَّذِي أَحَاطَ بِكُلِّ شَيْءٍ',ur:'اور تیرے اس علم کے وسیلے سے جو ہر چیز کو محیط ہے',en:'And by Your knowledge which encompasses all things'},

      {ar:'اللَّهُمَّ اغْفِرْ لِيَ الذُّنُوبَ الَّتِي تُورِثُ النَّدَمَ',ur:'اے اللہ! مجھے وہ گناہ بخش دے جو پچھتاوے کا سبب بنتے ہیں',en:'O Allah, forgive me those sins which bring regret'},
      {ar:'فَبِعِزَّتِكَ يَا سَيِّدِي وَمَوْلاَيَ أُقْسِمُ صَادِقاً',ur:'پس اے میرے سردار اور میرے آقا! تیری عزت کی قسم، میں سچ کہتا ہوں',en:'Then by Your honor, O my Master and Lord, I swear sincerely'},
      {ar:'لَئِنْ تَرَكْتَنِي نَاطِقاً لأَضِجَّنَّ إِلَيْكَ بَيْنَ أَهْلِهَا ضَجِيجَ الآمِلِينَ',ur:'اگر تو نے مجھے بولتا چھوڑ دیا تو میں ان (جہنم والوں) کے درمیان تیری طرف امیدواروں کی طرح فریاد کروں گا',en:'If You leave me speaking among its inhabitants, I will cry out to You among them with the cry of those who still hope'},

      {ar:'فَهَبْ لِي يَا إِلَهِي وَسَيِّدِي وَمَوْلاَيَ وَرَبِّي صَبْراً عَلَى بَلائِكَ',ur:'پس اے میرے معبود! اے میرے سردار! اے میرے آقا! اے میرے رب! مجھے اپنی آزمائش پر صبر عطا فرما',en:'So grant me, O my God, my Master, my Lord and my Sustainer, patience in Your trial'},
      {ar:'وَاجْعَلْنِي مِمَّنْ تَنْتَقِمُ مِنْهُ بِبَلائِهِ وَلاَ تُعِدْ عَلَيْهِ بَعْدَ عَذَابِكَ',ur:'اور مجھے ان لوگوں میں شامل فرما جن سے تو آزمائش کے ذریعے بدلہ لیتا ہے نہ کہ اپنے عذاب کے بعد',en:'And make me of those from whom You take revenge through their trial, and do not repeat upon them Your punishment'},
      {ar:'سَيِّدِي أَنَا الصَّغِيرُ الَّذِي رَبَّيْتَهُ',ur:'اے میرے سردار! میں وہ چھوٹا ہوں جسے تو نے پالا',en:'My Master, I am the small child that You raised'},

      {ar:'بِرَحْمَتِكَ يَا أَرْحَمَ الرَّاحِمِينَ',ur:'تیری رحمت کے واسطے اے سب سے زیادہ رحم کرنے والے',en:'By Your mercy, O most Merciful of the merciful'},
    ]
  },
  {

      {ar:'مُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَآلِهِ',ur:'محمد صلی اللہ علیہ وآلہ وسلم',en:'Muhammad, may Allah bless him and his family'},

      {ar:'يَا وَلِيَّ اللَّهِ الْمَهْدِيَّ أَدْرِكْنِي',ur:'اے اللہ کے ولی مہدی! میری مدد فرمائیں',en:'O Wali of Allah, al-Mahdi, come to my aid'},

      {ar:'أَيْنَ الْمُرْتَقَبُ لإِزَالَةِ الظُّلْمِ وَالْعُدْوَانِ',ur:'کہاں ہے وہ جس کا ظلم و ستم کو مٹانے کے لیے انتظار ہے',en:'Where is the awaited one for the elimination of oppression and aggression'},
      {ar:'بِأَبِي أَنْتَ وَأُمِّي وَنَفْسِي لَكَ الْوِقَاءُ وَالْحِمَايَةُ',ur:'میرے ماں باپ اور میری جان آپ پر قربان، آپ کے لیے حفاظت و پناہ ہو',en:'May my father, mother and soul be your ransom, may you have protection and shelter'},
      {ar:'عَجِّلْ اللَّهُمَّ فَرَجَهُ وَسَهِّلْ مَخْرَجَهُ',ur:'اے اللہ! ان کے فرج کو جلدی فرما اور ان کے ظہور کو آسان بنا',en:'O Allah, hasten their reappearance and ease their emergence'},
    ]
  },
  {
    id:'faraj',
    nameAr:'دُعَاءُ الْفَرَج',
    nameEn:'Dua Faraj',
    desc:'Imam Mahdi (AJ) ke zahoor ke liye dua. Mushkilaat mein bhi padhna mustahab hai.',
    verses:[
      {ar:'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ',ur:'اللہ کے نام سے جو بڑا مہربان نہایت رحم والا ہے',en:'In the name of Allah, the Most Gracious, the Most Merciful'},
      {ar:'اللَّهُمَّ كُنْ لِوَلِيِّكَ الْحُجَّةِ بْنِ الْحَسَنِ',ur:'اے اللہ! اپنے ولی حجۃ بن الحسن کے لیے ہو جا',en:'O Allah, be for Your guardian, the Hujjah son of Hasan'},
      {ar:'صَلَوَاتُكَ عَلَيْهِ وَعَلَى آبَائِهِ',ur:'تیری رحمتیں ہوں ان پر اور ان کے آباؤ اجداد پر',en:'May Your blessings be upon him and his forefathers'},
      {ar:'فِي هَذِهِ السَّاعَةِ وَفِي كُلِّ سَاعَةٍ',ur:'اس گھڑی میں اور ہر گھڑی میں',en:'In this hour and every hour'},
      {ar:'وَلِيّاً وَحَافِظاً وَقَائِداً وَنَاصِراً',ur:'ولی بن کر، حفاظت کرنے والے بن کر، رہنما بن کر، مدد گار بن کر',en:'A guardian, a protector, a guide and a supporter'},
      {ar:'وَدَلِيلاً وَعَيْناً حَتَّى تُسْكِنَهُ أَرْضَكَ طَوْعاً',ur:'اور رہنما اور نگہبان بن جا، یہاں تک کہ تو انہیں اپنی زمین میں خوشی سے ٹھہرائے',en:'And a guide and an eye (watching over them), until You settle them in Your earth willingly'},
      {ar:'وَتُمَتِّعَهُ فِيهَا طَوِيلاً',ur:'اور انہیں اس میں دیر تک آسودہ رکھے',en:'And grant them long enjoyment therein'},
      {ar:'اللَّهُمَّ عَجِّلْ وَلِيَّكَ وَابْنَ نَبِيِّكَ',ur:'اے اللہ! اپنے ولی اور اپنے نبی کے فرزند کو جلد بھیج',en:'O Allah, hasten Your guardian and the son of Your Prophet'},
      {ar:'وَاجْعَلْهُ الدَّاعِيَ إِلَيْكَ بِإِذْنِكَ',ur:'اور انہیں اپنے اذن سے تیری طرف دعوت دینے والا بنا',en:'And make him the one who calls to You by Your permission'},
    ]
  },
];

// Render tabs and panels
const navEl = document.getElementById('duaNav');
const panelsEl = document.getElementById('duaPanels');

DUAS.forEach((dua, idx) => {
  // Tab
  const tab = document.createElement('button');
  tab.className = 'dua-tab' + (idx===0?' active':'');
  tab.textContent = dua.nameEn;
  tab.onclick = () => {
    document.querySelectorAll('.dua-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.dua-panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+dua.id).classList.add('active');
  };
  navEl.appendChild(tab);

  // Panel
  const panel = document.createElement('div');
  panel.className = 'dua-panel' + (idx===0?' active':'');
  panel.id = 'panel-'+dua.id;

  let showUrdu = true, showEnglish = false;

  panel.innerHTML = `
    <div class="dua-header-card">
      <div class="dua-name-ar">${dua.nameAr}</div>
      <div class="dua-name-en">${dua.nameEn}</div>
      <div class="dua-desc">${dua.desc}</div>
    </div>
    <div class="dua-controls">
      <span style="font-size:12px;color:var(--muted);font-weight:600;">Tarjuma:</span>
      <button class="ctrl-btn active" data-mode="urdu" onclick="toggleLang('${dua.id}','urdu',this)">اردو</button>
      <button class="ctrl-btn" data-mode="english" onclick="toggleLang('${dua.id}','english',this)">English</button>
      <button class="ctrl-btn" style="margin-left:auto;" onclick="shareDua('${dua.nameEn}')">📤 Share</button>
    </div>
    <div style="border-radius:16px;overflow:hidden;border:1px solid var(--border-light);box-shadow:0 2px 12px rgba(0,0,0,.04);" id="verses-${dua.id}">
      ${dua.verses.map((v,i) => `
        <div class="dua-verse">
          <div class="dv-num">${i+1}</div>
          <div class="dv-arabic">${v.ar}</div>
          <div class="dv-urdu" id="${dua.id}-ur-${i}" style="${showUrdu?'':'display:none'}">${v.ur}</div>
          <div class="dv-english" id="${dua.id}-en-${i}" style="${showEnglish?'':'display:none'}">${v.en}</div>
        </div>`).join('')}
    </div>`;

  panelsEl.appendChild(panel);
});

function toggleLang(duaId, mode, btn) {
  const dua = DUAS.find(d=>d.id===duaId);
  if (!dua) return;
  btn.classList.toggle('active');
  const show = btn.classList.contains('active');
  dua.verses.forEach((v,i) => {
    const el = document.getElementById(`${duaId}-${mode==='urdu'?'ur':'en'}-${i}`);
    if (el) el.style.display = show ? '' : 'none';
  });
}

function shareDua(name) {
  const text = `${name} — Islamic Insights\n\nPadhen: https://islamicinsights-net.netlify.app/duas.html`;
  if (navigator.share) navigator.share({ title: name, text });
  else navigator.clipboard?.writeText(text).then(()=>alert('Link copy ho gaya!'));
}

// Hash navigation
if (location.hash) {
  const id = location.hash.slice(1);
  const tab = [...document.querySelectorAll('.dua-tab')].find(t => t.textContent.toLowerCase().includes(id));
  if (tab) tab.click();
}
</script>
</body>
</html>
