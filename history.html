<head>

<link rel="stylesheet" href="css/main.css">
<style>
.hist-cats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:32px;}
.hcat-btn{padding:9px 22px;border-radius:50px;border:2px solid var(--border);background:white;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Outfit',sans-serif;color:var(--text);}
.hcat-btn.active{background:var(--emerald);color:white;border-color:var(--emerald);}

.hist-card{background:white;border-radius:18px;overflow:hidden;border:1px solid var(--border-light);box-shadow:0 2px 12px rgba(0,0,0,.04);margin-bottom:20px;transition:all .3s;}
.hist-card:hover{box-shadow:0 12px 40px rgba(10,74,42,.1);}
.hc-banner{height:5px;}
.hc-head{padding:22px 26px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;}
.hc-icon{font-size:36px;flex-shrink:0;}
.hc-meta{flex:1;}
.hc-era{font-size:10.5px;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:4px;}
.hc-title{font-family:'Playfair Display',serif;font-size:19px;color:var(--emerald);font-weight:700;margin-bottom:4px;}
.hc-subtitle{font-size:13px;color:var(--muted);}
.hc-chevron{color:var(--muted);font-size:18px;transition:transform .3s;flex-shrink:0;}
.hist-card.open .hc-chevron{transform:rotate(180deg);}
.hc-body{display:none;padding:0 26px 26px;}
.hist-card.open .hc-body{display:block;}
.hc-content{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text);line-height:1.9;}
.hc-content p{margin-bottom:16px;}
.hc-content h4{font-family:'Playfair Display',serif;font-size:18px;color:var(--emerald);margin:20px 0 10px;}
.hc-timeline{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
.hc-tl-item{display:flex;gap:14px;align-items:flex-start;}
.hc-tl-year{background:var(--emerald);color:white;padding:4px 12px;border-radius:50px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.hc-tl-text{font-size:14px;color:var(--text);}

.timeline-banner{background:linear-gradient(135deg,var(--emerald),var(--emerald-mid));border-radius:20px;padding:32px;margin-bottom:32px;color:white;text-align:center;}
.tb-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:8px;}
.tb-desc{font-size:14px;color:rgba(255,255,255,.7);}
</style>
</head>
<body>
<div id="header-placeholder"></div>

<div class="page-hero">
  <div class="page-hero-tag">🏛️ History</div>
  <h1>اسلامی تاریخ</h1>
  <p>Seerat-un-Nabi • Khulafa • AhlulBayt • Karbala • Islamic Civilization</p>
</div>
<div class="breadcrumb"><div class="breadcrumb-inner"><a href="index.html">Home</a> <span>›</span> <span>Islamic History</span></div></div>

<div class="main">

    <button class="hcat-btn active" onclick="filterHist('all',this)">Sab</button>
    <button class="hcat-btn" onclick="filterHist('seerat',this)">🌙 Seerat un Nabi</button>
    <button class="hcat-btn" onclick="filterHist('ahlulbayt',this)">☪ AhlulBayt</button>
    <button class="hcat-btn" onclick="filterHist('karbala',this)">🌹 Karbala</button>
    <button class="hcat-btn" onclick="filterHist('civilisation',this)">🏛️ Islamic Civilisation</button>
  </div>

  <div id="histList"></div>
</div>

<div id="footer-placeholder"></div>
<script src="js/shared.js"></script>
<script>
document.getElementById('header-placeholder').innerHTML = buildHeader('history.html');
document.getElementById('footer-placeholder').innerHTML = buildFooter();

const HISTORY = [
  {
    cat:'seerat', icon:'🌟', era:'570–632 CE', color:'#c8941c',
    title:'Seerat-un-Nabi ﷺ — Mukhtasar Zindagi',
    subtitle:"Nabi Muhammad SAW ki puri zindagi ka khaka",
    content:`<p>Hazrat Muhammad SAW 12 Rabi ul Awwal 570 CE ko Makkah mein paida hue. Aap ke walid Abdullah aur walida Amina the. Aap ka naam Muhammad (SAW) rakha gaya — jo "tamam se tarif kiya gaya" ka matlab hai.</p>
    <h4>Pehle Wahi</h4>
    <p>40 saal ki umr mein Ghaar-e-Hira mein pehli wahi naazel hoi. Jibra'eel (AS) ne "Iqra" — padh — ka hukm diya. Yeh 610 CE ka waqiya hai.</p>
    <h4>Hijrat — Makkah se Madina</h4>
    <p>622 CE mein Nabi SAW ne Makkah se Madina ki taraf hijrat ki. Yahi Islamic calendar ka aaghaz hai.</p>
    <h4>Fatah Makkah</h4>
    <p>630 CE mein bina jang ke Makkah fath hua. Nabi SAW ne sabko maafi di.</p>`,
    timeline:[
      {y:'570 CE',t:"Nabi SAW ki wilaadat, Makkah"},
      {y:'595 CE',t:"Hazrat Khadija (SA) se nikah"},
      {y:'610 CE',t:"Pehli wahi, Ghaar-e-Hira"},
      {y:'622 CE',t:"Hijrat Madina — Islamic calendar shuru"},
      {y:'624 CE',t:"Ghazwa Badr"},
      {y:'630 CE',t:"Fatah Makkah"},
      {y:'632 CE',t:"Nabi SAW ka wisaal, 63 saal"},
    ]
  },
  {
    cat:'ahlulbayt', icon:'☪', era:'600–874 CE', color:'#0a4a2a',
    title:'Aimmah AhlulBayt — 12 Imaam',
    subtitle:"Nabi SAW ke paakon ki silsila",
    content:`<p>AhlulBayt — Nabi Muhammad SAW ki muqaddas aal — jinki mahabbat Quran mein farz ki gayi hai. Surah Ahzab 33:33 (Ayat e Tatheer) mein Allah ne unki paakigi ka elaan farmaya.</p>
    <h4>Imam Ali ibn Abi Talib (AS)</h4>
    <p>Nabi SAW ke chacha zaad bhai aur damaad. Pehle Imam. Unki fasihat Nahj al-Balagha mein mahfuz hai.</p>
    <h4>Imam Hussain (AS) — Shaheed Karbala</h4>
    <p>Nabi SAW ki hadith: "Hussain mujh se hai aur main Hussain se hoon." 10 Muharram 61 Hijri ko Karbala mein shaheed kiye gaye.</p>`,
    timeline:[
      {y:'600 CE',t:"Imam Ali (AS) ki wilaadat"},
      {y:'605 CE',t:"Bibi Fatima (SA) ki wilaadat"},
      {y:'624 CE',t:"Imam Hasan (AS) ki wilaadat"},
      {y:'626 CE',t:"Imam Hussain (AS) ki wilaadat"},
      {y:'661 CE',t:"Imam Ali (AS) ki shahadat"},
      {y:'680 CE',t:"Imam Hussain (AS) — Karbala"},
    ]
  },
  {
    cat:'karbala', icon:'🌹', era:'680 CE / 61 Hijri', color:'#8b0000',
    title:'Waqia-e-Karbala — Imam Hussain AS ki Shahadat',
    subtitle:"10 Muharram 61 Hijri — Zaalimon ke khilaf haq ki awaz",
    content:`<p>Yazid ibn Muawiyah ne jab Imam Hussain (AS) se Bay'at mangi, to Imam ne inkaar kiya aur farmaya: "Mujh jaise Yazid jaise ki bay'at nahi kar sakta."</p>
    <h4>Safar-e-Karbala</h4>
    <p>Imam Hussain (AS) apne 72 saathiyon ke saath Kufa ki taraf rawana hue. Lekin raste mein Hurr ki fauj ne raasta rok liya.</p>
    <h4>Raat-e-Ashura</h4>
    <p>9 Muharram ki raat Imam ne apne saathiyon ko ijaazat di ke jo jaana chahye jaye — lekin sab ne shahaadat ka intikhaab kiya.</p>
    <h4>Yazid ki fauj</h4>
    <p>30,000 se zyada afrad ne 72 logon ko ghera diya. 10 Muharram ko Asr ke waqt Imam Hussain (AS) ne shahaadat payi.</p>
    <h4>Asr ka Payaam</h4>
    <p>Karbala sirf ek jang nahi — yeh haq aur baatil ka muqabla hai. Har dour mein Hussain zinda hai.</p>`,
    timeline:[
      {y:'60 AH',t:"Yazid ne bay'at mangi — Imam ne inkaar kiya"},
      {y:'Rajab 60',t:"Imam Makkah pahunche"},
      {y:"Zil Hajj 60",t:"Imam Kufa ki taraf rawana"},
      {y:"2 Muharram 61",t:"Karbala pahunche"},
      {y:"7 Muharram",t:"Paani band"},
      {y:"9 Muharram",t:"Raat-e-Ashura"},
      {y:"10 Muharram",t:"Shahadat — Yom-e-Ashura"},
    ]
  },
  {
    cat:'civilisation', icon:'🏛️', era:'7th–13th Century CE', color:'#2c4a8a',
    title:'Islamic Golden Age — Ilm ka Daur',
    subtitle:"Jab Musalmaan duniya mein ilm ke sardar the",
    content:`<p>8th se 13th century tak Islamic civilization dunya ka ilmi markaz thi. Baghdad ka Bayt al-Hikma (House of Wisdom) duniya ki sab se badi library thi.</p>
    <h4>Science & Math</h4>
    <p>Al-Khwarizmi ne algebra ijad ki. Ibn al-Haytham ne optics par kaam kiya. Al-Biruni ne geography aur astronomy par kitaabein likhin.</p>
    <h4>Medicine</h4>
    <p>Ibn Sina (Avicenna) ki "Al-Qanun fi'l-Tibb" (Canon of Medicine) saikadon saalon tak European universities mein parhi jaati rahi.</p>
    <h4>Philosophy</h4>
    <p>Al-Farabi, Ibn Rushd (Averroes), aur Ibn Khaldun — jinke kaam ne European Renaissance ko mutasir kiya.</p>`,
    timeline:[
      {y:'622 CE',t:"Islamic state ka aaghaz"},
      {y:'750 CE',t:"Abbasid Caliphate — ilm ka daur shuru"},
      {y:'830 CE',t:"Bayt al-Hikma Baghdad — House of Wisdom"},
      {y:'980 CE',t:"Ibn Sina ki wilaadat"},
      {y:'1258 CE',t:"Mongol hamla — Baghdad tabah"},
    ]
  },
  {
    cat:'seerat', icon:'🌙', era:'622–660 CE', color:'#5a3a8a',
    title:'Khulafa-e-Rashideen — Char Khulfaa',
    subtitle:"Nabi SAW ke baad islami hukumat",
    content:`<p>Nabi Muhammad SAW ke wisaal ke baad 4 Khulafa ne islami hukumat ki. Unhein Khulafa-e-Rashideen (Sidhaa Rastay Waale) kaha jaata hai.</p>
    <h4>Hazrat Abu Bakr (RA) — 632–634</h4>
    <p>Pehle Khalifa. Qur'an ki tartib dene ka kaam unke dour mein shuru hua.</p>
    <h4>Hazrat Umar ibn al-Khattab (RA) — 634–644</h4>
    <p>Islam ki hukumat Persia, Iraq, Syria, Egypt tak pahunchi. Ek mutaadil system qaayam kiya.</p>
    <h4>Hazrat Uthman ibn Affan (RA) — 644–656</h4>
    <p>Quran ki copy tayyar karwai. Unke dour mein ittihad aur ikhtilaf dono aaye.</p>
    <h4>Hazrat Ali ibn Abi Talib (AS) — 656–661</h4>
    <p>Imam Ali (AS) ne adl-o-insaaf ka daur qaayam kiya. Nahj al-Balagha unki fasihat ka tazkira hai.</p>`,
    timeline:[
      {y:'632 CE',t:"Hazrat Abu Bakr (RA) — Pehle Khalifa"},
      {y:'634 CE',t:"Hazrat Umar (RA) — Doosre Khalifa"},
      {y:'644 CE',t:"Hazrat Uthman (RA) — Teesre Khalifa"},
      {y:'656 CE',t:"Imam Ali (AS) — Chauthe Khalifa"},
      {y:'661 CE',t:"Imam Ali (AS) ki shahadat — Kufa"},
    ]
  },
];

function makeHistCard(h) {
  const tl = h.timeline ? `<div class="hc-timeline">${h.timeline.map(t=>`<div class="hc-tl-item"><span class="hc-tl-year">${t.y}</span><span class="hc-tl-text">${t.t}</span></div>`).join('')}</div>` : '';
  const id = 'hc-' + Math.random().toString(36).slice(2);
  return `<div class="hist-card" id="${id}" data-cat="${h.cat}">
    <div class="hc-banner" style="background:${h.color};"></div>
    <div class="hc-head" onclick="toggleHist('${id}')">
      <div class="hc-icon">${h.icon}</div>
      <div class="hc-meta">
        <div class="hc-era">${h.era}</div>
        <div class="hc-title">${h.title}</div>
        <div class="hc-subtitle">${h.subtitle}</div>
      </div>
      <div class="hc-chevron">▾</div>
    </div>
    <div class="hc-body">
      <div class="hc-content">${h.content}</div>
      ${tl}
    </div>
  </div>`;
}

function renderAll(cat) {
  const list = cat === 'all' ? HISTORY : HISTORY.filter(h=>h.cat===cat);
  document.getElementById('histList').innerHTML = list.map(makeHistCard).join('');
}

function filterHist(cat, btn) {
  document.querySelectorAll('.hcat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll(cat);
}

function toggleHist(id) {
  document.getElementById(id).classList.toggle('open');
}

renderAll('all');
</script>
</body>
</html>
